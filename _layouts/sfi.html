<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | SFI Foundation</title>
    <meta name="description" content="{{ page.description | default: 'SFI Foundation - Setting the Standard for Motorsports Safety Since 1978' }}">
    <link rel="icon" href="{{ '/images/sfi/favicon-32x32.png' | relative_url }}" sizes="32x32">
    <link rel="icon" href="{{ '/images/sfi/favicon-192x192.png' | relative_url }}" sizes="192x192">
    <link rel="apple-touch-icon" href="{{ '/images/sfi/apple-touch-icon.png' | relative_url }}">
    {% include sfi/styles.html %}
  </head>
  <body style="margin:0;padding:0;background:var(--sfi-bg,#f4f5f7);color:var(--sfi-text,#1a1d23);">
    <header class="sfi-header">
      <a href="/sfifoundation/" class="sfi-header-logo">
        <img src="{{ '/images/sfi/SFI-Logo.png' | relative_url }}" alt="SFI Foundation" class="sfi-logo-img">
      </a>
      <div class="sfi-header-tagline">Setting the Standard for<br>Motorsports Safety Since 1978.</div>
    </header>
    {% include sfi/nav.html %}
    <main>
      {{ content }}
    </main>
    {% include sfi/footer.html %}
    {% include sfi/chatbot.html %}
    <script>
      // Mobile nav toggle
      document.getElementById('navToggle').addEventListener('click', () => {
        document.getElementById('navLinks').classList.toggle('open');
      });
      document.querySelectorAll('.sfi-nav-links a').forEach(a => {
        a.addEventListener('click', () => document.getElementById('navLinks').classList.remove('open'));
      });
    </script>
  </body>
</html>
