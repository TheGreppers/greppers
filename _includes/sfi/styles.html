<style>
/* ── Variables ─────────────────────────────────── */
:root {
  --sfi-bg: #f4f5f7;
  --sfi-white: #ffffff;
  --sfi-surface: #ffffff;
  --sfi-surface2: #f0f2f5;
  --sfi-surface3: #e8ebef;
  --sfi-border: #d1d5db;
  --sfi-border-bright: #9ca3af;
  --sfi-blue: #1a5fa8;
  --sfi-blue-dark: #124080;
  --sfi-blue-light: #2e7fd4;
  --sfi-blue-accent: #3b9ede;
  --sfi-text: #1a1d23;
  --sfi-text-secondary: #374151;
  --sfi-muted: #6b7280;
  --sfi-red: #c0392b;
  --sfi-green: #27ae60;
  --sfi-radius: 6px;
  --sfi-radius-sm: 4px;
  --sfi-shadow: 0 1px 4px rgba(0,0,0,0.10);
  --sfi-shadow-md: 0 4px 16px rgba(0,0,0,0.10);
}
* { box-sizing: border-box; }

body {
  background: var(--sfi-bg);
  color: var(--sfi-text);
  font-family: 'Inter', Arial, sans-serif;
  margin: 0;
  padding: 0;
}

/* ── Top utility bar ──────────────────────────── */
.sfi-topbar {
  background: var(--sfi-blue-dark);
  color: rgba(255,255,255,0.75);
  font-size: 0.75rem;
  padding: 5px 32px;
  display: flex;
  justify-content: flex-end;
  gap: 20px;
  font-family: 'Inter', sans-serif;
}
.sfi-topbar a {
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  transition: color 0.2s;
}
.sfi-topbar a:hover { color: #fff; }

/* ── Header (logo + tagline) ──────────────────── */
.sfi-header {
  background: var(--sfi-white);
  border-bottom: 1px solid var(--sfi-border);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sfi-header-logo {
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
}
.sfi-logo-img {
  height: 54px;
  width: auto;
  display: block;
}
@media (max-width: 600px) {
  .sfi-logo-img { height: 42px; }
  .sfi-header { padding: 10px 16px; }
  .sfi-header-tagline { font-size: 0.72rem; }
}
.sfi-logo-emblem {
  width: 72px;
  height: 52px;
  background: #1a1a1a;
  border: 3px solid #1a1a1a;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.sfi-logo-emblem-inner {
  background: #fff;
  border-radius: 50%;
  width: 52px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.sfi-logo-emblem-sfi {
  font-family: 'Oswald', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: #1a1a1a;
  line-height: 1;
  letter-spacing: 1px;
}
.sfi-logo-emblem-text {
  font-size: 0.35rem;
  font-weight: 700;
  color: #1a1a1a;
  letter-spacing: 0.5px;
  line-height: 1;
  text-align: center;
  text-transform: uppercase;
}
.sfi-header-tagline {
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  font-style: italic;
  color: var(--sfi-muted);
  text-align: right;
  line-height: 1.5;
}

/* ── Navigation ───────────────────────────────── */
.sfi-nav {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: var(--sfi-blue);
  border-bottom: 3px solid var(--sfi-blue-accent);
}
.sfi-nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  padding: 0 32px;
  height: 46px;
}
.sfi-nav-links {
  display: flex;
  gap: 0;
  align-items: center;
  list-style: none;
  margin: 0;
  padding: 0;
  height: 100%;
}
.sfi-nav-links li {
  height: 100%;
  display: flex;
  align-items: center;
  position: relative;
}
.sfi-nav-links a {
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  text-decoration: none;
  padding: 0 16px;
  height: 100%;
  display: flex;
  align-items: center;
  transition: background 0.15s;
  white-space: nowrap;
  border-right: 1px solid rgba(255,255,255,0.08);
}
.sfi-nav-links a:hover,
.sfi-nav-links a.active {
  background: rgba(255,255,255,0.12);
  color: #fff;
}
.sfi-nav-links a.sfi-nav-cta {
  background: #e8a020;
  color: #000;
  font-weight: 700;
  margin-left: 12px;
  border-radius: 3px;
  border: none;
  padding: 0 18px;
}
.sfi-nav-links a.sfi-nav-cta:hover {
  background: #f0b030;
  color: #000;
}
.sfi-nav-links a.sfi-nav-highlight {
  color: #7dd3fa;
}
.sfi-nav-auth-link {
  color: rgba(255,255,255,0.9) !important;
  font-weight: 600 !important;
}
.sfi-nav-auth-avatar {
  display: inline-flex !important;
  align-items: center;
  gap: 6px;
  color: #7dd3fa !important;
  font-weight: 600 !important;
}
.sfi-nav-auth-dot {
  width: 7px; height: 7px;
  background: #4ade80;
  border-radius: 50%;
}
.sfi-nav-toggle {
  display: none;
  background: none;
  border: none;
  color: #fff;
  font-size: 1.5rem;
  cursor: pointer;
  margin-left: auto;
}
@media (max-width: 900px) {
  .sfi-nav-toggle { display: block; }
  .sfi-nav-inner { padding: 0 16px; }
  .sfi-nav-links {
    display: none;
    position: absolute;
    top: 46px; left: 0; right: 0;
    background: var(--sfi-blue-dark);
    flex-direction: column;
    height: auto;
    padding: 8px 0;
    border-bottom: 2px solid var(--sfi-blue-accent);
  }
  .sfi-nav-links.open { display: flex; }
  .sfi-nav-links li { width: 100%; height: auto; }
  .sfi-nav-links a {
    width: 100%;
    padding: 12px 20px;
    height: auto;
    border-right: none;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
}

/* ── Hero banner ──────────────────────────────── */
.sfi-hero {
  position: relative;
  background: linear-gradient(105deg, #0d2e5c 0%, #1a5fa8 40%, #1e7bc4 70%, #0f3d6e 100%);
  overflow: hidden;
  min-height: 340px;
  display: flex;
  align-items: center;
}
.sfi-hero-bg-overlay {
  position: absolute;
  inset: 0;
  background:
    url('https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/2018_NHRA_US_Nationals_%2844261143952%29.jpg/1280px-2018_NHRA_US_Nationals_%2844261143952%29.jpg')
    center/cover no-repeat;
  opacity: 0.18;
}
.sfi-hero-content {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 64px 32px;
  width: 100%;
}
.sfi-hero h1 {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 700;
  color: #fff;
  margin: 0 0 12px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  letter-spacing: 1px;
}
.sfi-hero h1 em {
  font-style: normal;
  color: #7dd3fa;
}
.sfi-hero-sub {
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-style: italic;
  color: rgba(255,255,255,0.85);
  margin: 0 0 28px;
  max-width: 520px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.sfi-hero-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

/* ── Buttons ──────────────────────────────────── */
.sfi-btn {
  font-family: 'Inter', sans-serif;
  padding: 11px 28px;
  border-radius: var(--sfi-radius-sm);
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
  border: 2px solid transparent;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  letter-spacing: 0.3px;
}
.sfi-btn-primary {
  background: var(--sfi-blue);
  color: #fff;
  border-color: var(--sfi-blue);
}
.sfi-btn-primary:hover {
  background: var(--sfi-blue-dark);
  border-color: var(--sfi-blue-dark);
  color: #fff;
}
.sfi-btn-secondary {
  background: transparent;
  color: #fff;
  border-color: rgba(255,255,255,0.6);
}
.sfi-btn-secondary:hover {
  background: rgba(255,255,255,0.12);
  border-color: #fff;
}
.sfi-btn-outline {
  background: transparent;
  color: var(--sfi-blue);
  border-color: var(--sfi-blue);
}
.sfi-btn-outline:hover {
  background: var(--sfi-blue);
  color: #fff;
}

/* ── Page Header (subpages) ───────────────────── */
.sfi-page-header {
  background: linear-gradient(105deg, #0d2e5c 0%, #1a5fa8 60%, #1e7bc4 100%);
  padding: 56px 32px 44px;
  border-bottom: 3px solid var(--sfi-blue-accent);
}
.sfi-page-header-content {
  max-width: 1100px;
  margin: 0 auto;
}
.sfi-page-header h1 {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 700;
  color: #fff;
  margin: 0 0 8px;
  letter-spacing: 1px;
}
.sfi-page-header h1 .gold { color: #f0c040; }
.sfi-page-header p {
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  color: rgba(255,255,255,0.8);
  margin: 0;
  font-style: italic;
}
.sfi-breadcrumb {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.6);
  margin-bottom: 10px;
  font-family: 'Inter', sans-serif;
}
.sfi-breadcrumb a { color: rgba(255,255,255,0.6); text-decoration: none; }
.sfi-breadcrumb a:hover { color: #fff; }
.sfi-breadcrumb span { margin: 0 6px; }

/* ── Main content area ────────────────────────── */
.sfi-main-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 36px 24px 60px;
}

/* ── Section Shared ───────────────────────────── */
.sfi-sect {
  max-width: 1200px;
  margin: 0 auto;
  padding: 48px 24px;
}
.sfi-sect-label {
  font-family: 'Inter', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--sfi-blue-accent);
  margin-bottom: 8px;
}
.sfi-sect-title {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight: 700;
  color: var(--sfi-text);
  margin: 0 0 12px;
  letter-spacing: 0.5px;
}
.sfi-sect-desc {
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  color: var(--sfi-muted);
  line-height: 1.7;
  max-width: 680px;
  margin-bottom: 32px;
}

/* ── Homepage content cards ───────────────────── */
.sfi-home-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 48px;
}
.sfi-home-card {
  background: var(--sfi-white);
  border: 1px solid var(--sfi-border);
  border-top: 3px solid var(--sfi-blue);
  border-radius: var(--sfi-radius);
  padding: 0;
  text-decoration: none;
  display: block;
  transition: box-shadow 0.2s, border-top-color 0.2s;
  box-shadow: var(--sfi-shadow);
  overflow: hidden;
}
.sfi-home-card:hover {
  box-shadow: var(--sfi-shadow-md);
  border-top-color: var(--sfi-blue-accent);
}
.sfi-home-card-img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  display: block;
  background: var(--sfi-surface2);
}
.sfi-home-card-img-placeholder {
  width: 100%;
  height: 160px;
  background: linear-gradient(135deg, #1a5fa8 0%, #3b9ede 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
}
.sfi-home-card-body {
  padding: 18px 20px 20px;
}
.sfi-home-card h3 {
  font-family: 'Oswald', sans-serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--sfi-blue);
  margin: 0 0 8px;
  letter-spacing: 0.3px;
}
.sfi-home-card p {
  font-family: 'Inter', sans-serif;
  font-size: 0.83rem;
  color: var(--sfi-muted);
  line-height: 1.6;
  margin: 0;
}

/* ── Welcome section ──────────────────────────── */
.sfi-welcome {
  background: var(--sfi-white);
  border-top: 1px solid var(--sfi-border);
  border-bottom: 1px solid var(--sfi-border);
  padding: 40px 24px;
}
.sfi-welcome-inner {
  max-width: 1200px;
  margin: 0 auto;
}
.sfi-welcome h2 {
  font-family: 'Oswald', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--sfi-text);
  margin: 0 0 12px;
  letter-spacing: 0.5px;
}
.sfi-welcome p {
  font-family: 'Inter', sans-serif;
  font-size: 0.92rem;
  color: var(--sfi-text-secondary);
  line-height: 1.75;
  max-width: 900px;
  margin: 0;
}

/* ── Feature Cards ────────────────────────────── */
.sfi-features {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 18px;
}
.sfi-feature-card {
  background: var(--sfi-white);
  border: 1px solid var(--sfi-border);
  border-top: 3px solid var(--sfi-blue);
  border-radius: var(--sfi-radius);
  padding: 24px 22px;
  transition: box-shadow 0.2s, border-top-color 0.2s;
  box-shadow: var(--sfi-shadow);
  text-decoration: none;
  display: block;
}
.sfi-feature-card:hover {
  box-shadow: var(--sfi-shadow-md);
  border-top-color: var(--sfi-blue-accent);
}
.sfi-feature-icon {
  font-size: 1.5rem;
  margin-bottom: 12px;
  display: block;
}
.sfi-feature-card h3 {
  font-family: 'Oswald', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  color: var(--sfi-blue);
  margin: 0 0 8px;
  letter-spacing: 0.3px;
}
.sfi-feature-card p {
  font-family: 'Inter', sans-serif;
  font-size: 0.83rem;
  color: var(--sfi-muted);
  line-height: 1.6;
  margin: 0;
}

/* ── Category Tiles ───────────────────────────── */
.sfi-cat-browse {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
}
.sfi-cat-tile {
  background: var(--sfi-white);
  border: 1px solid var(--sfi-border);
  border-radius: var(--sfi-radius);
  padding: 22px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  box-shadow: var(--sfi-shadow);
}
.sfi-cat-tile:hover {
  border-color: var(--sfi-blue);
  box-shadow: var(--sfi-shadow-md);
  transform: translateY(-2px);
}
.sfi-cat-tile-icon { font-size: 2rem; margin-bottom: 10px; display: block; }
.sfi-cat-tile-name {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  color: var(--sfi-blue);
  font-size: 0.82rem;
  margin-bottom: 4px;
}
.sfi-cat-tile-count {
  font-family: 'Inter', sans-serif;
  color: var(--sfi-muted);
  font-size: 0.72rem;
}

/* ── Stats Strip ──────────────────────────────── */
.sfi-stats-strip {
  background: var(--sfi-blue-dark);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  max-width: 100%;
}
.sfi-stat-item {
  padding: 28px 16px;
  text-align: center;
  border-right: 1px solid rgba(255,255,255,0.1);
}
.sfi-stat-item:last-child { border-right: none; }
.sfi-stat-num {
  font-family: 'Oswald', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  color: #fff;
  line-height: 1;
}
.sfi-stat-desc {
  font-family: 'Inter', sans-serif;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-top: 6px;
}
@media (max-width: 600px) {
  .sfi-stats-strip { grid-template-columns: repeat(2, 1fr); }
}

/* ── Info Grid ────────────────────────────────── */
.sfi-info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
@media (max-width: 768px) { .sfi-info-grid { grid-template-columns: 1fr; } }
.sfi-info-card {
  background: var(--sfi-white);
  border: 1px solid var(--sfi-border);
  border-radius: var(--sfi-radius);
  padding: 24px;
  box-shadow: var(--sfi-shadow);
}
.sfi-info-card h3 {
  font-family: 'Oswald', sans-serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--sfi-blue);
  margin: 0 0 12px;
  letter-spacing: 0.3px;
  border-bottom: 1px solid var(--sfi-border);
  padding-bottom: 10px;
}
.sfi-info-card p {
  font-family: 'Inter', sans-serif;
  font-size: 0.88rem;
  color: var(--sfi-text-secondary);
  line-height: 1.7;
  margin: 0 0 10px;
}
.sfi-info-card p:last-child { margin-bottom: 0; }
.sfi-info-card a { color: var(--sfi-blue); text-decoration: none; }
.sfi-info-card a:hover { text-decoration: underline; }

/* ── Timeline ─────────────────────────────────── */
.sfi-timeline {
  position: relative;
  padding-left: 36px;
}
.sfi-timeline::before {
  content: '';
  position: absolute;
  left: 12px; top: 0; bottom: 0;
  width: 2px;
  background: var(--sfi-blue);
  opacity: 0.2;
}
.sfi-timeline-item {
  position: relative;
  margin-bottom: 28px;
}
.sfi-timeline-item::before {
  content: '';
  position: absolute;
  left: -29px; top: 5px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--sfi-blue);
  border: 2px solid var(--sfi-white);
  box-shadow: 0 0 0 2px var(--sfi-blue);
}
.sfi-timeline-year {
  font-family: 'Oswald', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--sfi-blue);
  margin-bottom: 4px;
}
.sfi-timeline-text {
  font-family: 'Inter', sans-serif;
  font-size: 0.88rem;
  color: var(--sfi-text-secondary);
  line-height: 1.6;
}

/* ── CTA Banner ───────────────────────────────── */
.sfi-cta-banner {
  background: linear-gradient(105deg, #0d2e5c, #1a5fa8);
  border-radius: var(--sfi-radius);
  padding: 48px 40px;
  text-align: center;
}
.sfi-cta-banner h2 {
  font-family: 'Oswald', sans-serif;
  font-size: 1.7rem;
  font-weight: 700;
  color: #fff;
  margin: 0 0 10px;
  letter-spacing: 0.5px;
}
.sfi-cta-banner p {
  font-family: 'Inter', sans-serif;
  color: rgba(255,255,255,0.8);
  font-size: 0.95rem;
  margin: 0 0 24px;
  line-height: 1.6;
}
.sfi-cta-banner .sfi-btn { margin: 0 6px; }

/* ── Contact ──────────────────────────────────── */
.sfi-contact-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
}
.sfi-contact-item {
  background: var(--sfi-white);
  border: 1px solid var(--sfi-border);
  border-radius: var(--sfi-radius);
  padding: 22px;
  text-align: center;
  box-shadow: var(--sfi-shadow);
  transition: box-shadow 0.2s;
}
.sfi-contact-item:hover { box-shadow: var(--sfi-shadow-md); }
.sfi-contact-item-icon { font-size: 1.5rem; margin-bottom: 8px; }
.sfi-contact-item-label {
  font-family: 'Inter', sans-serif;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--sfi-muted);
  margin-bottom: 5px;
}
.sfi-contact-item-val {
  font-family: 'Inter', sans-serif;
  font-size: 0.88rem;
  color: var(--sfi-text);
}
.sfi-contact-item-val a { color: var(--sfi-blue); text-decoration: none; }
.sfi-contact-item-val a:hover { text-decoration: underline; }

/* ── Divider ──────────────────────────────────── */
.sfi-divider {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}
.sfi-divider hr {
  border: none;
  height: 1px;
  background: var(--sfi-border);
}

/* ── Footer ───────────────────────────────────── */
.sfi-footer {
  background: #1a1d23;
  color: rgba(255,255,255,0.7);
  padding: 36px 24px 24px;
