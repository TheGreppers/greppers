Badge: "Prototype Review · CSP Capstone"
Title: "A Prototype for the SFI Foundation"
Tagline: "Today is a prototype review. We'll walk the build, compare it to SFI's current public system, and invite your direction on where the real system should go next."

Problem: "SFI's current site holds the right standards — but they're buried. There's no search, no way to sign in, no way for a driver, inspector, or staff member to see anything tailored to them, and every standard change has to route through someone who can edit the page by hand."

Solution: "A working prototype of what an SFI-run system could look like: sign-in with profiles, plain-English search, a photo identifier for safety gear, light quizzes for learning, and a dashboard that lets your staff update the site directly. It's a preview — and an invitation to shape where it goes from here."

Organization: "SFI Foundation"
Team: "Aditya Srivastava, Dhyan Soni, Aaryav Lal"
BackendUrl: "https://github.com/TheGreppers/"

FeatureCards:
  - title: "Plain-English Search"
    desc: "Find any of 140+ safety standards by name or description — no memorizing numbers, and typos are fine."
  - title: "Identify Equipment by Photo"
    desc: "Photograph a piece of gear and the prototype tells you the standard it's meant to meet — right on the phone, nothing uploaded."
  - title: "Sign-In That Knows You"
    desc: "Drivers, inspectors, and staff each sign in and see the tools and information relevant to their role."
  - title: "Staff Dashboard, No Code"
    desc: "Your team updates standards, manages roles, and keeps the site on-mission — without a developer in the loop."

