Badge: "Prototype Review · CSP Capstone"
Title: "A Prototype for the SFI Foundation"
Tagline: "Today is a prototype review. We'll walk the build, compare it to SFI's current public system, and invite your direction on where the real system should go next."

Problem: "SFI's existing site is a static publisher. The standards are correct but buried — no search, no accounts, no per-user context, and every spec update has to route through someone who can edit raw HTML."
Solution: "A working prototype with logins, profiles, plain-English search, an AI classifier, gamified learning, and an admin console. It demonstrates what the real, non-profit-operated system could look like — and opens the floor to where we take it next."

Organization: "SFI Foundation"
Team: "Aditya Srivastava, Dhyan Soni, Aaryav Lal"
BackendUrl: "https://github.com/TheGreppers/greppers"

FeatureCards:
  - title: "Plain-English Spec Search"
    desc: "Find any of 140+ SFI standards by description, not just by number — typo-tolerant and discipline-aware."
  - title: "AI Equipment Identification"
    desc: "Photograph a piece of gear and the prototype predicts its SFI certification category on-device."
  - title: "Login, Profiles, User-Specific Views"
    desc: "Scoped accounts for drivers, inspectors, and staff — each sees the spec data and tools relevant to them."
  - title: "Admin Console, No Code"
    desc: "Staff publish standard changes, manage user roles, and keep content safe through a dashboard — no developer."

